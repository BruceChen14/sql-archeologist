name: Build and Deploy
on:
  push:
    branches: [ main ]
permissions:
  contents: write
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install and Build
        run: |
          npm install
          # 使用 --output-path=dist 強制把檔案放在 dist 資料夾，不要多一層專案名
          npx ng build --base-href /sql-archeologist/ --output-path=dist

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          # 因為上面強制輸出了，這裡路徑改為 dist/browser 
          # (Angular 17+ 預設會多一個 browser 資料夾)
          folder: dist/browser
          branch: gh-pages
