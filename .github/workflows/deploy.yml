name: Build and Deploy
on:
  push:
    branches: [ main ]
permissions:
  contents: write
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # 🔥 強制使用 Node 20，解決版本過舊報錯
          cache: 'npm'     # 開啟快取，下次編譯會快很多

      - name: Install and Build
        run: |
          npm ci           # 比 npm install 更適合自動化環境的安裝指令
          npx ng build --base-href /sql-archeologist/ --output-path=dist

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist/browser
          branch: gh-pages
